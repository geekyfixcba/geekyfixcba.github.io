<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignacio Abril | GeekyFix</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #FF5722, #E91E63, #9C27B0);
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            color: var(--text-color);
        }
        /* Efecto Antigravity en el Logo */
        .logo-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-gradient);
            padding: 5px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: float 4s ease-in-out infinite;
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 100%;
            border-radius: 50%;
            background: white;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 30px; text-align: center; }

        /* Estilo Stick (Botones Limpios) */
        .links-container { width: 100%; max-width: 400px; }
        .link-card {
            background: white;
            display: block;
            text-decoration: none;
            color: var(--text-color);
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .link-card:hover {
            transform: scale(1.03);
            border-color: #E91E63;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .highlight {
            background: var(--primary-gradient);
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="tu-logo-redondo.png" alt="GeekyFix Logo">
    </div>

    <h1>Ignacio Abril</h1>
    <p>Soporte IT & Automatización en Córdoba 🇦🇷</p>

    <div class="links-container">
        <a href="https://geekyfix.tech/" class="link-card highlight">🌐 Visitar GeekyFix.tech</a>
        <a href="https://wa.me/TU_NUMERO" class="link-card">💬 Soporte por WhatsApp</a>
        <a href="#servicios" class="link-card">🛠️ Servicios para Adultos Mayores</a>
        <a href="https://github.com/tu-usuario/MindLog" class="link-card">📓 Proyecto MindLog</a>
        <a href="mailto:tu-email@gmail.com" class="link-card">✉️ Contacto Directo</a>
    </div>

</body>
</html>
