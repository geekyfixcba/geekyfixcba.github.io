<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacho Abril | GeekyFix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #FF5722, #E91E63, #9C27B0);
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --sub-text: #666666;
            --border-color: #eeeeee;
        }

        /* Modo Oscuro */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-color: #f8f9fa;
                --sub-text: #bbbbbb;
                --border-color: #333333;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            transition: background-color 0.3s ease;
        }

        /* Logo con animación flotante */
        .logo-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-gradient);
            padding: 4px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: float 4s ease-in-out infinite;
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: white;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; }
        .subtitle { color: var(--sub-text); margin-bottom: 30px; text-align: center; }

        .links-container { width: 100%; max-width: 400px; }

        .link-card {
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
