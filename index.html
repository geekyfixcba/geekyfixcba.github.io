<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacho Abril | GeekyFix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #FF5722, #E91E63, #9C27B0);
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --sub-text: #666666;
            --border-color: #eeeeee;
            --toggle-bg: #dddddd;
        }

        /* Variables para Modo Oscuro Manual */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f8f9fa;
            --sub-text: #bbbbbb;
            --border-color: #333333;
            --toggle-bg: #444444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px 20px;
            margin: 0;
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        /* Toggle de Modo Oscuro */
        .theme-switch-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            z-index: 100;
        }
        .theme-switch {
            display: inline-block;
            height: 34px;
            position: relative;
            width: 60px;
        }
        .theme-switch input { display: none; }
        .slider {
            background-color: var(--toggle-bg);
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5px;
        }
        .slider:before {
            background-color: #fff;
            bottom: 4px;
            content: "";
            height: 26px;
            left: 4px;
            position: absolute;
            transition: .4s;
            width: 26px;
            border-radius: 50%;
            z-index: 2;
        }
        input:checked + .slider { background: var(--primary-gradient); }
        input:checked + .slider:before { transform: translateX(26px); }
        .slider i { color: #f1c40f; font-size: 14px; }

        /* Logo con efecto Antigravity */
        .logo-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-gradient);
            padding: 4px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: float 4s ease-in-out infinite;
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: white;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; }
        .subtitle { color: var(--sub-text); margin-bottom: 30px; text-align: center; line-height: 1.4; }

        .links-container { width: 100%; max-width: 400px; }

        /* Estilo Stick para los botones */
        .link-card {
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-color);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .link-card i { position: absolute; left: 20px; font-size: 1.4rem; }
        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #E91E63;
        }

        /* Botón de WhatsApp */
        .whatsapp-btn { background: #25D366; color: white; border: none; }
        .whatsapp-btn:hover { background: #20ba5a; border-color: transparent; }

        /* Redes Sociales */
        .social-row { display: flex; gap: 25px; margin-top: 25px; }
        .social-icon { font-size: 1.8rem; color: var(--text-color); transition: 0.3s; }
        .social-icon:hover { color: #E91E63; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </div>
        </label>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="GeekyFix Logo">
    </div>

    <h1>Ignacio Abril</h1>
    <div class="subtitle">
        Soporte IT & Soluciones para Adultos Mayores <br> 
        Córdoba, Argentina 🇦🇷
    </div>

    <div class="links-container">
        <a href="https://wa.me/5493512179222?text=Hola%20Nacho!%20Te%20escribo%20desde%20GeekyFix,%20necesito%20ayuda%20con%20un%20tema%20técnico." class="link-card whatsapp-btn">
            <i class="fab fa-whatsapp"></i> Soporte por WhatsApp
        </a>

        <a href="https://geekyfix.tech/" class="link-card">
            <i class="fas fa-globe"></i> Visitar GeekyFix.tech
        </a>

        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=nachoabril@gmail.com" class="link-card">
            <i class="fab fa-google"></i> Escribime un Gmail
        </a>
    </div>

    <div class="social-row">
        <a href="https://www.instagram.com/geekyfixcba/" target="_blank" class="social-icon">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://www.facebook.com/geekyfix.cba/" target="_blank" class="social-icon">
            <i class="fab fa-facebook"></i>
        </a>
    </div>

    <script>
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.body.classList.add(currentTheme);
            if (currentTheme === 'dark-mode') {
                toggleSwitch.checked = true;
            }
        }

        function switchTheme(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light-mode');
            }    
        }

        toggleSwitch.addEventListener('change', switchTheme, false);
    </script>
</body>
</html>
